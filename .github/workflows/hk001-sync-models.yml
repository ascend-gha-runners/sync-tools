name: HK001 Sync Models
on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/config/hk001-models.json"
      - ".github/workflows/hk001-sync-models.yml"

concurrency:
  group: hk001-sync-models-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync_models:
    uses: ./.github/workflows/reusable-sync-models-datasets.yml
    with:
      runs_on: linux-aarch64-sync-hk001
      container_image: python:3.11-slim
      models_config: .github/workflows/config/hk001-models.json
