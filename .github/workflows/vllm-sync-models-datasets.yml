name: vllm sync datasets and models
on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/config/vllm-downloaded-datasets.ini"
      - ".github/workflows/config/vllm-downloaded-models.ini"
      - ".github/workflows/vllm-sync-models-datasets.yml"

concurrency:
  group: sync-models-datasets-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync_dataset:
    uses: ./.github/workflows/reusable-sync-models-datasets.yml
    with:
      runs_on: linux-amd64-vllm-guiyang003
      container_image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:8.2.rc1-a3-ubuntu22.04-py3.11
      models_config: .github/workflows/config/vllm-downloaded-models.ini
      datasets_config: .github/workflows/config/vllm-downloaded-datasets.ini
