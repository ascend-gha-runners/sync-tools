name: HK001 Sync Datasets
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/config/hk001-datasets.json"
      - ".github/workflows/hk001-sync-datasets.yml"

concurrency:
  group: hk001-sync-datasets-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync_datasets:
    uses: ./.github/workflows/reusable-sync-models-datasets.yml
    with:
      runs_on: linux-aarch64-sync-hk001
      container_image: python:3.11-slim
      datasets_config: .github/workflows/config/hk001-datasets.json
