name: Sync Images Between Registries

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *" # every hour
  #pull_request:
  #  branches:
  #    - main
  #  paths:
  #    - ".github/workflows/sync-images.yml"
  #push:
  #  branches:
  #    - main
  #  paths:
  #    - ".github/workflows/sync-images.yml"

concurrency:
  group: sync-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-quay-to-swr:
    name: Sync from Quay to SWR Southwest
    runs-on: ubuntu-latest
    container:
      image: quay.io/skopeo/stable:latest
    strategy:
      matrix:
        repo: ["cann", "vllm-ascend", "manylinux", "llamafactory", "triton", "mindspore", "python", "pytorch", "veomni", "verl"]
    steps:
      - name: Sync quay.io/ascend/${{ matrix.repo }} to SWR Southwest
        run: |
          skopeo sync --all \
            --retry-times 3 \
            --retry-delay 5s \
            --src docker --dest docker \
            --dest-creds ${{ vars.HWCLOUD_USER }}:${{ secrets.HWCLOUD_PWD }} \
            quay.io/ascend/${{ matrix.repo }} \
            ${{ vars.REGISTRY_SW_2 }}/base_image/ascend-ci/${{ matrix.repo }}


  sync-sglang-cann-tags:
    name: Sync lmsysorg/sglang CANN-related tags to SWR
    runs-on: ubuntu-latest
    container:
      image: quay.io/skopeo/stable:latest
    steps:
      - name: Install dependencies
        run: |
          microdnf update -y && microdnf install -y jq curl

      - name: Fetch all tags and filter CANN-related ones
        id: get-cann-tags
        run: |
          # 使用独立脚本获取 DockerHub tags，最多获取 10 页
          TAGS=$(bash .github/scripts/fetch_dockerhub_tags.sh "lmsysorg/sglang" "cann" 10)
          if [ -n "$TAGS" ]; then
            echo "tags=$TAGS" >> $GITHUB_OUTPUT
          else
            echo "tags=" >> $GITHUB_OUTPUT
          fi

      - name: Debug tags output
        run: |
          echo "Debug: Output from get-cann-tags step:"
          echo "Tags variable: '${{ steps.get-cann-tags.outputs.tags }}'"
          
          if [ -n "${{ steps.get-cann-tags.outputs.tags }}" ]; then
            echo "Debug: Split tags for verification:"
            IFS=' ' read -ra TAG_ARRAY <<< "${{ steps.get-cann-tags.outputs.tags }}"
            for tag in "${TAG_ARRAY[@]}"; do
              echo "Tag: $tag"
            done
          else
            echo "Debug: No tags found"
          fi

      - name: Test skopeo connection
        run: |
          echo "Debug: Testing skopeo connection to source registry..."
          skopeo inspect --retry-times 1 docker://docker.io/lmsysorg/sglang:latest || echo "Debug: Skopeo inspect test completed"

      - name: Sync each CANN-related tag
        if: steps.get-cann-tags.outputs.tags != ''
        run: |
          echo "Debug: Starting sync process..."
          TAGS="${{ steps.get-cann-tags.outputs.tags }}"
          
          for tag in $TAGS; do
            echo "Syncing tag: $tag"
            if skopeo copy --all \
              --retry-times 3 \
              --src-no-creds \
              --dest-creds "${{ vars.HWCLOUD_USER }}:${{ secrets.HWCLOUD_PWD }}" \
              docker://docker.io/lmsysorg/sglang:$tag \
              docker://${{ vars.REGISTRY_SW_2 }}/base_image/dockerhub/lmsysorg/sglang:$tag; then
              echo "✅ Successfully synced tag: $tag"
            else
              echo "❌ Failed to sync tag: $tag"
              exit 1
            fi
          done
          echo "🎉 All tags synced successfully"

      - name: No tags found message
        if: steps.get-cann-tags.outputs.tags == ''
        run: |
          echo "ℹ️ No CANN-related tags found to sync"

     
  sync-sglang-to-quay:
    name: Sync lmsysorg/sglang CANN-related tags to Quay
    runs-on: ubuntu-latest
    container:
      image: quay.io/skopeo/stable:latest
    steps:
      - name: Install jq and curl
        run: |
          microdnf update -y && microdnf install -y jq curl
  
      - name: Fetch all tags and filter CANN-related ones
        id: get-cann-tags
        run: |
          # 使用独立脚本获取 DockerHub tags，最多获取 10 页以保持与上一个 job 行为一致
          TAGS=$(bash .github/scripts/fetch_dockerhub_tags.sh "lmsysorg/sglang" "cann" 10)
          if [ -n "$TAGS" ]; then
            echo "tags=$TAGS" >> $GITHUB_OUTPUT
          else
            echo "tags=" >> $GITHUB_OUTPUT
          fi
  
      - name: Sync each CANN-related tag to Quay
        if: steps.get-cann-tags.outputs.tags != ''
        run: |
          for tag in ${{ steps.get-cann-tags.outputs.tags }}; do
            if skopeo copy --all \
              --retry-times 3 \
              --src-no-creds \
              --dest-creds "${{ vars.QUAY_ASCEND_USER }}:${{ secrets.QUAY_ASCEND_PWD }}" \
              docker://docker.io/lmsysorg/sglang:$tag \
              docker://quay.io/ascend/sglang:$tag; then
              echo "✅ Synced: $tag"
            else
              echo "❌ Failed: $tag"
            fi
          done
          echo "🎉 All tags synced successfully"

      - name: No tags found message
        if: steps.get-cann-tags.outputs.tags == ''
        run: |
          echo "ℹ️ No CANN-related tags found to sync"


  sync-verl-to-hk:
    name: Sync quay.io/ascend/verl to SWR Hong Kong
    runs-on: ubuntu-latest
    container:
      image: quay.io/skopeo/stable:latest
    steps:
      - name: Sync verl from Quay to SWR Hong Kong
        run: |
          skopeo sync --all \
            --retry-times 3 \
            --retry-delay 5s \
            --src docker --dest docker \
            --src-no-creds \
            --dest-creds ${{ vars.SWR_HK_USER }}:${{ secrets.SWR_HK_SECRET }} \
            quay.io/ascend/verl \
            ${{ vars.REGISTRY_HK }}/base_image/ascend-ci/verl

  sync-verl-to-swr-southwest:
    name: Sync quay.io/ascend/verl to SWR Southwest
    runs-on: ubuntu-latest
    container:
      image: quay.io/skopeo/stable:latest
    steps:
      - name: Sync verl from Quay to SWR Southwest
        run: |
          skopeo sync --all \
            --retry-times 3 \
            --retry-delay 5s \
            --src docker --dest docker \
            --src-no-creds \
            --dest-creds ${{ vars.HWCLOUD_USER }}:${{ secrets.HWCLOUD_PWD }} \
            quay.io/ascend/verl \
            ${{ vars.REGISTRY_SW_2 }}/modelfoundry/ascend-ci/verl
