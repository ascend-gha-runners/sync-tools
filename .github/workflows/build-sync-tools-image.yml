name: Build sync-tools image

on:
  workflow_dispatch:

concurrency:
  group: build-sync-tools-image
  cancel-in-progress: true

env:
  IMAGE: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/sync-tools:latest
  REGISTRY: swr.cn-southwest-2.myhuaweicloud.com

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.HWCLOUD_USER }}
          password: ${{ secrets.HWCLOUD_PWD }}

      - name: Build and push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .github/docker/sync-tools
          file: .github/docker/sync-tools/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE }}
          provenance: false
