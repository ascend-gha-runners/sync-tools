name: Sync Images Between Registries

on:
  workflow_dispatch:
  schedule:
      - cron: "0 * * * *"

concurrency:
  group: sync-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-images:
    name: Sync images from config
    runs-on: ubuntu-latest
    container:
      image: quay.io/skopeo/stable:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq and curl
        run: microdnf install -y jq curl

      - name: Sync all image mappings
        env:
          QUAY_ASCEND_USER: ${{ vars.QUAY_ASCEND_USER }}
          QUAY_ASCEND_PWD: ${{ secrets.QUAY_ASCEND_PWD }}
          DOCKERHUB_USER: ${{ vars.DOCKERHUB_USER }}
          DOCKERHUB_PWD: ${{ secrets.DOCKERHUB_PWD }}
          HWCLOUD_USER: ${{ vars.HWCLOUD_USER }}
          HWCLOUD_PWD: ${{ secrets.HWCLOUD_PWD }}
          SWR_HK_USER: ${{ vars.REGISTRY_HK_USER }}
          SWR_HK_SECRET: ${{ secrets.SWR_HK_SECRET }}
        run: |
          # 根据镜像域名返回对应 creds，格式为 "user:pwd"，无认证返回空
          get_creds() {
            local img="$1"
            case "$img" in
              quay.io/*)
                echo "${QUAY_ASCEND_USER}:${QUAY_ASCEND_PWD}" ;;
              docker.io/*)
                echo "${DOCKERHUB_USER}:${DOCKERHUB_PWD}" ;;
              swr.cn-southwest-2.*)
                echo "${HWCLOUD_USER}:${HWCLOUD_PWD}" ;;
              swr.ap-southeast-1.*)
                echo "${SWR_HK_USER}:${SWR_HK_SECRET}" ;;
              ascendhub.*)
                echo "" ;;  # 待补充
              *)
                echo "" ;;
            esac
          }

          # 根据 creds 字符串构造 skopeo inspect/copy 的认证参数数组
          # 用法：eval "$(build_creds_args SRC "$SRC_CREDS")"  → 设置 SRC_ARGS 数组
          build_skopeo_args() {
            local var="$1" creds="$2"
            if [ -n "$creds" ]; then
              eval "${var}=(--creds \"$creds\")"
            else
              eval "${var}=(--no-creds)"
            fi
          }

          # 获取 tag 列表：tag_filter 非空时走 Docker Hub API 分页过滤，否则走 skopeo list-tags
          get_tags() {
            local src="$1" tag_filter="$2" src_creds="$3"

            if [ -n "$tag_filter" ]; then
              local repo tags="" next_url page=1
              repo=$(echo "$src" | sed 's|docker\.io/||')
              next_url="https://hub.docker.com/v2/repositories/${repo}/tags/?page_size=100"
              while [ "$next_url" != "null" ] && [ "$page" -le 20 ]; do
                local resp page_tags
                resp=$(curl -s "$next_url")
                page_tags=$(echo "$resp" | jq -r --arg f "$tag_filter" '.results[] | select(.name | test($f; "i")) | .name' 2>/dev/null || true)
                [ -n "$page_tags" ] && tags="$tags"$'\n'"$page_tags"
                next_url=$(echo "$resp" | jq -r '.next // "null"')
                page=$((page + 1))
              done
              echo "$tags" | sed '/^$/d' | sort -u
            else
              build_skopeo_args SRC_ARGS "$src_creds"
              skopeo list-tags "${SRC_ARGS[@]}" docker://"$src" 2>/dev/null | jq -r '.Tags[]'
            fi
          }

          CONFIG=".github/workflows/config/image-sync.json"
          TOTAL=$(jq length "$CONFIG")
          echo "Total mappings: $TOTAL"

          for i in $(seq 0 $((TOTAL - 1))); do
            SRC=$(jq -r ".[$i].src" "$CONFIG")
            DEST=$(jq -r ".[$i].dest" "$CONFIG")
            TAG_FILTER=$(jq -r ".[$i].tag_filter // empty" "$CONFIG")

            echo ""
            echo "=== [$((i+1))/$TOTAL] $SRC → $DEST ==="

            SRC_CREDS=$(get_creds "$SRC")
            DEST_CREDS=$(get_creds "$DEST")
            build_skopeo_args SRC_ARGS "$SRC_CREDS"
            build_skopeo_args DEST_ARGS "$DEST_CREDS"

            TAGS=$(get_tags "$SRC" "$TAG_FILTER" "$SRC_CREDS")
            if [ -z "$TAGS" ]; then
              echo "No tags found, skipping"
              continue
            fi

            SYNCED=0; SKIPPED=0; FAILED=0

            for tag in $TAGS; do
              SRC_IMG="docker://$SRC:$tag"
              DEST_IMG="docker://$DEST:$tag"

              SRC_RAW=$(skopeo inspect "${SRC_ARGS[@]}" --raw "$SRC_IMG" 2>/dev/null)
              DEST_RAW=$(skopeo inspect "${DEST_ARGS[@]}" --raw "$DEST_IMG" 2>/dev/null)

              if [ -n "$SRC_RAW" ] && [ -n "$DEST_RAW" ]; then
                SRC_DIGEST=$(echo "$SRC_RAW" | sha256sum | awk '{print $1}')
                DEST_DIGEST=$(echo "$DEST_RAW" | sha256sum | awk '{print $1}')
                if [ "$SRC_DIGEST" = "$DEST_DIGEST" ]; then
                  echo "⏭️  Skip $tag (digest unchanged)"
                  SKIPPED=$((SKIPPED + 1))
                  continue
                fi
              fi

              echo "Syncing $tag..."
              if skopeo copy --all \
                --retry-times 3 \
                --retry-delay 5s \
                "${SRC_ARGS[@]}" \
                "${DEST_ARGS[@]}" \
                "$SRC_IMG" "$DEST_IMG"; then
                echo "✅ Synced $tag"
                SYNCED=$((SYNCED + 1))
              else
                echo "❌ Failed $tag"
                FAILED=$((FAILED + 1))
              fi
            done

            echo "Done: $SYNCED synced, $SKIPPED skipped, $FAILED failed"
          done

          echo ""
          echo "All mappings processed"
