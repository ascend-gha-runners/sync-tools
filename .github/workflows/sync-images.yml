name: Sync Images Between Registries

on:
  workflow_dispatch:
  schedule:
      - cron: "0 * * * *"

concurrency:
  group: sync-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare sync matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - run: |
          matrix=$(jq -c '[.[].src] | unique | map({src: .})' .github/workflows/config/image-sync.json)
          echo "matrix=$matrix" >> $GITHUB_OUTPUT
        id: set-matrix

  sync:
    name: Sync ${{ matrix.src }}
    needs: prepare
    runs-on: ubuntu-latest
    container:
      image: quay.io/skopeo/stable:latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq and curl
        run: microdnf install -y jq curl

      - name: Restore digest cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/digest-cache
          key: digest-cache-${{ matrix.src }}

      - name: Sync ${{ matrix.src }} to all destinations
        env:
          QUAY_ASCEND_USER: ${{ vars.QUAY_ASCEND_USER }}
          QUAY_ASCEND_PWD: ${{ secrets.QUAY_ASCEND_PWD }}
          DOCKERHUB_USER: ${{ vars.DOCKERHUB_USER }}
          DOCKERHUB_PWD: ${{ secrets.DOCKERHUB_PWD }}
          HWCLOUD_USER: ${{ vars.HWCLOUD_USER }}
          HWCLOUD_PWD: ${{ secrets.HWCLOUD_PWD }}
          SWR_HK_USER: ${{ vars.REGISTRY_HK_USER }}
          SWR_HK_SECRET: ${{ secrets.SWR_HK_SECRET }}
          CURRENT_SRC: ${{ matrix.src }}
        run: |
          get_creds() {
            case "$1" in
              quay.io/*)              echo "${QUAY_ASCEND_USER}:${QUAY_ASCEND_PWD}" ;;
              docker.io/*)            echo "${DOCKERHUB_USER}:${DOCKERHUB_PWD}" ;;
              swr.cn-southwest-2.*)   echo "${HWCLOUD_USER}:${HWCLOUD_PWD}" ;;
              swr.ap-southeast-1.*)   echo "${SWR_HK_USER}:${SWR_HK_SECRET}" ;;
              *)                      echo "" ;;
            esac
          }

          build_inspect_args() {
            local var="$1" creds="$2"
            [ -n "$creds" ] && eval "${var}=(--creds \"$creds\")" || eval "${var}=(--no-creds)"
          }

          build_copy_src_args() {
            local var="$1" creds="$2"
            [ -n "$creds" ] && eval "${var}=(--src-creds \"$creds\")" || eval "${var}=(--src-no-creds)"
          }

          build_copy_dest_args() {
            local var="$1" creds="$2"
            [ -n "$creds" ] && eval "${var}=(--dest-creds \"$creds\")" || eval "${var}=(--dest-no-creds)"
          }

          # 比较各平台子 manifest digest 列表（content-addressed，跨 registry 稳定）
          # 避免 Docker Hub 重新序列化 manifest list 导致顶层 digest 不一致
          get_manifest_id() {
            local raw
            raw=$(skopeo inspect --raw "$@" 2>/dev/null || true)
            [ -z "$raw" ] && echo "" && return
            echo "$raw" | jq -r '
              if .manifests then
                [.manifests[].digest] | sort | join(",")
              else
                .config.digest // empty
              end
            ' 2>/dev/null || true
          }

          CONFIG=".github/workflows/config/image-sync.json"
          SRC="$CURRENT_SRC"
          CACHE_FILE="/tmp/digest-cache/$(echo "$SRC" | tr '/:' '__').json"
          mkdir -p /tmp/digest-cache
          [ -f "$CACHE_FILE" ] || echo '{}' > "$CACHE_FILE"

          # 获取该 src 的所有 dest 和 tag_filter（取第一个 tag_filter，同一 src 应一致）
          DESTS=$(jq -r --arg src "$SRC" '.[] | select(.src == $src) | .dest' "$CONFIG")
          TAG_FILTER=$(jq -r --arg src "$SRC" 'first(.[] | select(.src == $src) | .tag_filter // empty)' "$CONFIG")

          SRC_CREDS=$(get_creds "$SRC")
          build_inspect_args SRC_INSPECT_ARGS "$SRC_CREDS"
          build_copy_src_args SRC_COPY_ARGS "$SRC_CREDS"

          # 获取 tag 列表（只做一次）
          if [ -n "$TAG_FILTER" ]; then
            repo=$(echo "$SRC" | sed 's|docker\.io/||')
            TAGS="" next_url="https://hub.docker.com/v2/repositories/${repo}/tags/?page_size=100" page=1
            while [ "$next_url" != "null" ] && [ "$page" -le 20 ]; do
              resp=$(curl -s "$next_url")
              page_tags=$(echo "$resp" | jq -r --arg f "$TAG_FILTER" '.results[] | select(.name | test($f; "i")) | .name' 2>/dev/null || true)
              [ -n "$page_tags" ] && TAGS="$TAGS"$'\n'"$page_tags"
              next_url=$(echo "$resp" | jq -r '.next // "null"')
              page=$((page + 1))
            done
            TAGS=$(echo "$TAGS" | sed '/^$/d' | sort -u)
          else
            TAGS=$(skopeo list-tags "${SRC_INSPECT_ARGS[@]}" docker://"$SRC" 2>/dev/null | jq -r '.Tags[]')
          fi

          if [ -z "$TAGS" ]; then
            echo "No tags found for $SRC"
            exit 0
          fi

          TAG_COUNT=$(echo "$TAGS" | wc -l)
          echo "Found $TAG_COUNT tags for $SRC"

          # 对每个 dest 逐 tag 同步，src inspect 结果复用
          for DEST in $DESTS; do
            echo ""
            echo "--- $SRC → $DEST ---"
            DEST_CREDS=$(get_creds "$DEST")
            build_inspect_args DEST_INSPECT_ARGS "$DEST_CREDS"
            build_copy_dest_args DEST_COPY_ARGS "$DEST_CREDS"

            SYNCED=0; SKIPPED=0; FAILED=0

            for tag in $TAGS; do
              SRC_IMG="docker://$SRC:$tag"
              DEST_IMG="docker://$DEST:$tag"
              echo "from=\"$SRC_IMG\" to=\"$DEST_IMG\""
              SRC_DIGEST=$(get_manifest_id "${SRC_INSPECT_ARGS[@]}" "$SRC_IMG")

              if [[ "$DEST" == docker.io/* ]]; then
                CACHED_DIGEST=$(jq -r --arg key "$DEST:$tag" '.[$key] // empty' "$CACHE_FILE")
                if [ -n "$SRC_DIGEST" ] && [ -n "$CACHED_DIGEST" ] && [ "$SRC_DIGEST" = "$CACHED_DIGEST" ]; then
                  echo "⏭️  Skip $tag (cache)"
                  SKIPPED=$((SKIPPED + 1))
                  continue
                fi
              else
                DEST_DIGEST=$(get_manifest_id "${DEST_INSPECT_ARGS[@]}" "$DEST_IMG")
                if [ -n "$SRC_DIGEST" ] && [ -n "$DEST_DIGEST" ] && [ "$SRC_DIGEST" = "$DEST_DIGEST" ]; then
                  echo "⏭️  Skip $tag"
                  SKIPPED=$((SKIPPED + 1))
                  continue
                fi
              fi

              echo "Syncing $tag..."
              set +e
              skopeo copy --all \
                --retry-times 3 \
                --retry-delay 5s \
                "${SRC_COPY_ARGS[@]}" \
                "${DEST_COPY_ARGS[@]}" \
                "$SRC_IMG" "$DEST_IMG"
              copy_exit=$?
              set -e
              if [ $copy_exit -eq 0 ] || [ $copy_exit -eq 2 ]; then
                echo "✅ Synced $tag"
                SYNCED=$((SYNCED + 1))
                if [[ "$DEST" == docker.io/* ]] && [ -n "$SRC_DIGEST" ]; then
                  tmp=$(mktemp)
                  jq --arg key "$DEST:$tag" --arg val "$SRC_DIGEST" '.[$key] = $val' "$CACHE_FILE" > "$tmp" && mv "$tmp" "$CACHE_FILE"
                fi
              else
                echo "❌ Failed $tag (exit $copy_exit)"
                FAILED=$((FAILED + 1))
              fi
            done

            echo "Done [$SRC → $DEST]: $SYNCED synced, $SKIPPED skipped, $FAILED failed"

            if [[ "$DEST" == docker.io/* ]]; then
              rate_token=$(curl -sf "https://auth.docker.io/token?service=registry.docker.io&scope=repository:ratelimitpreview/test:pull" \
                -u "${DOCKERHUB_USER}:${DOCKERHUB_PWD}" | jq -r '.token // empty')
              rate=$(curl -sf -I -H "Authorization: Bearer ${rate_token}" \
                "https://registry-1.docker.io/v2/ratelimitpreview/test/manifests/latest" 2>/dev/null \
                | grep -i ratelimit-remaining | tr -d '\r' || echo "unknown")
              echo "Docker Hub rate limit remaining: $rate"
            fi

            [ $FAILED -eq 0 ] || exit 1
          done

      - name: Save digest cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /tmp/digest-cache
          key: digest-cache-${{ matrix.src }}-${{ github.run_id }}
